<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1419;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#grad1)" rx="20" ry="20"/>

  <!-- Border -->
  <rect x="10" y="10" width="580" height="380" fill="none" stroke="url(#goldGrad)" stroke-width="3" rx="15" ry="15"/>

  <!-- Inner border -->
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#38b6ff" stroke-width="1" rx="10" ry="10" opacity="0.3"/>

  <!-- Header -->
  <text x="300" y="60" text-anchor="middle" font-family="serif" font-size="28" fill="#ffd700" font-weight="bold">
    Certificate of Completion
  </text>

  <!-- NIDADS Logo placeholder -->
  <circle cx="300" cy="100" r="25" fill="#38b6ff" opacity="0.2"/>
  <text x="300" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38b6ff" font-weight="bold">
    NIDADS
  </text>

  <!-- Main text -->
  <text x="300" y="160" text-anchor="middle" font-family="serif" font-size="16" fill="#ffffff">
    This is to certify that
  </text>

  <text x="300" y="200" text-anchor="middle" font-family="serif" font-size="24" fill="#ffffff" font-weight="bold">
    [Student Name]
  </text>

  <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="16" fill="#ffffff">
    has successfully completed the course
  </text>

  <text x="300" y="280" text-anchor="middle" font-family="serif" font-size="20" fill="#38b6ff" font-weight="bold">
    Diploma in Data Analytics & AI
  </text>

  <!-- Signature lines -->
  <line x1="150" y1="320" x2="250" y2="320" stroke="#ffffff" stroke-width="1"/>
  <line x1="350" y1="320" x2="450" y2="320" stroke="#ffffff" stroke-width="1"/>

  <text x="200" y="340" text-anchor="middle" font-family="serif" font-size="12" fill="#b9c3d1">
    Instructor Signature
  </text>
  <text x="400" y="340" text-anchor="middle" font-family="serif" font-size="12" fill="#b9c3d1">
    Director Signature
  </text>

  <!-- Date -->
  <text x="300" y="370" text-anchor="middle" font-family="serif" font-size="12" fill="#b9c3d1">
    Date: [Completion Date]
  </text>
</svg>